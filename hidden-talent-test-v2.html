<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hidden Talent Test - Hugo Mojo</title>
<meta name="description" content="Find your hidden talent in 3 minutes.">
<meta property="og:title" content="Hidden Talent Test - Hugo Mojo">
<meta property="og:description" content="That thing people tease you about? It's your hidden superpower.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://hugomojo.com/">
<meta property="og:image" content="https://hugomojo.com/og-hidden-talent-en.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    margin: 0;
    overflow-x: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fafafa;
    color: #1a1a1a;
    -webkit-font-smoothing: antialiased;
  }
  .screen { position: relative; z-index: 1; display: none; min-height: 100vh; }
  .screen.active { display: block; }
  .primary-cta {
    background: #f97316;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 16px 32px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .primary-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(249, 115, 22, 0.3);
  }
  .option {
    width: 100%;
    background: white;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    padding: 20px;
    text-align: left;
    font-size: 18px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .option:hover {
    border-color: #f97316;
    background: #fff7ed;
  }
  .option.selected {
    border-color: #f97316;
    background: #fff7ed;
  }
  .progress-bar {
    width: 100%;
    height: 6px;
    background: #e5e5e5;
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #f97316;
    transition: width 0.3s ease;
  }
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 16px;
    background: rgba(250,250,250,0.9);
    backdrop-filter: blur(8px);
    z-index: 10;
  }
  nav .nav-inner {
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo {
    font-weight: 700;
    font-size: 16px;
  }
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="logo"><img src="/logo.svg" alt="Hugo Mojo" class="h-6 w-auto"></div>
    <a href="https://www.hugomojo.com/cn" class="text-sm text-gray-500">中文</a>
  </div>
</nav>

<main class="pt-16">
  <section id="intro" class="screen active">
    <div class="max-w-lg mx-auto px-4 py-20 flex flex-col items-center text-center">
      <h1 class="text-5xl md:text-6xl font-bold leading-tight mb-6">
        That thing people<br>tease you about?
      </h1>
      <p class="text-2xl text-orange-500 font-semibold mb-8">
        It's your hidden superpower.
      </p>
      <p class="text-lg text-gray-500 mb-10">
        3-minute quick test.
      </p>
      <button class="primary-cta" onclick="startQuiz()">
        Start the test →
      </button>
    </div>
  </section>

  <section id="quiz" class="screen">
    <div class="max-w-lg mx-auto px-4 py-10">
      <div class="progress-bar mb-8">
        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
      </div>
      <p id="qNumber" class="text-sm text-gray-400 mb-4">Question 1/13</p>
      <h1 id="questionText" class="text-3xl md:text-4xl font-bold leading-tight mb-10">
      </h1>
      <div id="optionsContainer" class="flex flex-col gap-4">
      </div>
      <div class="mt-8 flex justify-between">
        <button id="prevButton" class="text-gray-500 text-sm" onclick="prevQuestion()">Back</button>
        <button id="nextButton" class="primary-cta opacity-40" onclick="nextQuestion()" disabled>Next</button>
      </div>
    </div>
  </section>

  <section id="loading" class="screen">
    <div class="max-w-lg mx-auto px-4 py-20 flex flex-col items-center text-center">
      <h2 class="text-2xl font-bold mb-4">Calculating your result...</h2>
      <p class="text-gray-500">Just a second.</p>
    </div>
  </section>
</main>
<script>
const QUESTIONS = [
{"q":"A group chat suddenly goes quiet. What do you notice first?","a":[["Who stopped replying","radar"],["A line that could make it feel lighter","sprite"],["What needs to happen next","bulldozer"],["Which message changed the mood","fox"]]},
{"q":"A new plan feels slightly off from the start. You usually...","a":[["Look for the parts that could go wrong","rabbit"],["Check whether someone is already forcing it","overloaded"],["Try to understand why it feels awkward","fox"],["Shrink it into a smaller test","bulldozer"]]},
{"q":"A friend says, \"I am fine,\" but their tone says otherwise. You...","a":[["Think: no, you are definitely not fine","radar"],["Make it easier for them to stop pretending","overloaded"],["Ask what is actually weighing on them","fox"],["Help them decide what to do tonight","bulldozer"]]},
{"q":"People usually need you most when they need...","a":[["A little momentum","sprite"],["A filter for a risky choice","rabbit"],["Someone who can read the room","radar"],["A version that can actually be delivered","bulldozer"]]},
{"q":"The talent people underrate in you is...","a":[["Leaving before the mess has a name","rabbit"],["Making boring things easier to start","sprite"],["Catching the change in someone's tone","radar"],["Carrying a lot without announcing it","overloaded"]]},
{"q":"Which compliment would land hardest for you?","a":[["You make people feel safe","overloaded"],["You saw the shift before anyone else","radar"],["You actually got it done","bulldozer"],["You made people want to join","sprite"]]},
{"q":"What drains you fastest?","a":[["Fake explanations","fox"],["Being trapped in the wrong place","rabbit"],["Everyone needing you at once","overloaded"],["A room with no energy","sprite"]]},
{"q":"Your brain wakes up when...","a":[["A pattern needs to be unpacked","fox"],["There is a cleaner exit route","rabbit"],["Someone needs a soft landing","overloaded"],["An idea needs a better opening line","sprite"]]},
{"q":"When everyone is hesitating, you usually...","a":[["Make the first usable move","bulldozer"],["Notice who is close to burning out","radar"],["Say the line that changes the mood","sprite"],["Spot the decision everyone is avoiding","fox"]]},
{"q":"Your first instinct is usually to...","a":[["Scan the room","radar"],["Lower the risk","rabbit"],["Absorb the pressure","overloaded"],["Get something working","bulldozer"]]},
{"q":"If you made a tiny paid product, it would help people...","a":[["Feel less alone","overloaded"],["Avoid a bad choice","rabbit"],["Understand what is really happening","fox"],["Start with more confidence","sprite"]]},
{"q":"What would make this test useful for you?","a":[["Show me the hidden pattern","fox"],["Help me avoid the wrong direction","rabbit"],["Give me a clear next step","bulldozer"],["Make me feel accurately seen","radar"]]}
];
const TYPE_ORDER=['overloaded','rabbit','radar','sprite','bulldozer','fox'];
let current=0,answers={},scores=makeScores(),autoAdvanceTimer=null;
function makeScores(){const s={};TYPE_ORDER.forEach(k=>s[k]=0);return s;}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo({top:0,behavior:'smooth'});}
function startQuiz(){hmTrack('quiz_start');clearTimeout(autoAdvanceTimer);current=0;answers={};scores=makeScores();renderQuestion();showScreen('quiz');}
function renderQuestion(){const q=QUESTIONS[current],picked=answers[current];
  document.getElementById('qNumber').textContent = `Question ${current+1}/${QUESTIONS.length}`;
  document.getElementById('progressFill').style.width = ((current+1)/QUESTIONS.length*100)+'%';
  document.getElementById('questionText').textContent = q.q;
  const next=document.getElementById('nextButton');
  next.classList.toggle('opacity-40',!picked);
  next.disabled = !picked;
  let html='';
  q.a.forEach((item,i)=>{
    html+=`<button class="option ${picked===item[1]?'selected':''}" onclick="pickAnswer('${item[1]}')">${item[0]}</button>`;
  });
  document.getElementById('optionsContainer').innerHTML=html;
}
function pickAnswer(k){const q=current;clearTimeout(autoAdvanceTimer);answers[current]=k;renderQuestion();autoAdvanceTimer=setTimeout(()=>{if(current===q&&answers[q]===k)nextQuestion()},250);}
function prevQuestion(){clearTimeout(autoAdvanceTimer);if(current===0){showScreen('intro');return;}current--;renderQuestion();}
function nextQuestion(){clearTimeout(autoAdvanceTimer);if(!answers[current]){return;}if(current<QUESTIONS.length-1){current++;renderQuestion();return;}
  Object.values(answers).forEach(k=>scores[k]++);
  showScreen('loading');
  setTimeout(()=>{
    const result=rankTypes()[0]||TYPE_ORDER[0];
    hmTrack('quiz_complete',{talent:result});
    window.location.href = '/delivery/delivery_' + result + '_en.html';
  },900);
}
function rankTypes(){return Object.entries(scores).sort((a,b)=>(b[1]-a[1])||(TYPE_ORDER.indexOf(a[0])-TYPE_ORDER.indexOf(b[0]))).map(x=>x[0]);}
function hmTrack(){}
</script>
</body>
</html>
