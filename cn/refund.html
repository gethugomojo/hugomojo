<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>退款政策 - Hugo Mojo</title><link rel="icon" href="/favicon.svg" type="image/svg+xml"><style>
  :root { --ink:#0D0D14; --card:#12121F; --paper:#F0EDE6; --gold:#F5C842; --line:#2A2840; --mint:#5CE8C4; --rose:#FF7043; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif; color:var(--paper); background:radial-gradient(circle at 16% 0%, rgba(245,200,66,.2), transparent 28rem), radial-gradient(circle at 86% 4%, rgba(123,92,255,.18), transparent 24rem), linear-gradient(180deg,#0D0D14,#12121F 56%,#17142B); }
  body::before { content:""; position:fixed; inset:0; pointer-events:none; opacity:.25; background-image:repeating-linear-gradient(0deg, rgba(240,237,230,.025) 0 1px, transparent 1px 26px); }
  main { position:relative; width:min(1060px, calc(100% - 32px)); margin:0 auto; padding:42px 0 72px; }
  nav, section, .card { border:1px solid rgba(240,237,230,.12); border-radius:10px; background:rgba(18,18,31,.84); box-shadow:0 22px 70px rgba(0,0,0,.26); backdrop-filter:blur(10px); }
  nav { display:flex; justify-content:space-between; align-items:center; padding:14px 18px; margin-bottom:18px; }
  a { color:inherit; text-decoration:none; } .brand { font-weight:900; }
  .hero { padding:34px; } .block { margin-top:18px; padding:28px; }
  .eyebrow { color:var(--gold); font-size:12px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; }
  h1 { margin:12px 0 0; font-size:clamp(42px,7vw,86px); line-height:.95; letter-spacing:0; }
  h2 { margin:0; font-size:clamp(26px,4vw,42px); line-height:1.08; } h3 { margin:.2rem 0 .4rem; }
  p { color:rgba(240,237,230,.72); line-height:1.75; } strong { color:var(--paper); }
  .grid { display:grid; gap:14px; grid-template-columns:repeat(3,minmax(0,1fr)); margin-top:20px; }
  .card { padding:18px; background:rgba(240,237,230,.06); }
  .steps { display:grid; gap:10px; margin-top:16px; }
  .step { display:flex; gap:12px; align-items:flex-start; border:1px solid rgba(240,237,230,.1); border-radius:10px; padding:14px; background:rgba(240,237,230,.05); }
  .num { flex:0 0 auto; display:grid; place-items:center; width:30px; height:30px; border-radius:999px; background:var(--gold); color:var(--ink); font-weight:900; }
  .btn { display:inline-flex; align-items:center; justify-content:center; margin-top:14px; padding:14px 18px; border-radius:10px; background:var(--gold); color:var(--ink); font-weight:900; }
  .btn.secondary { background:rgba(240,237,230,.08); color:var(--paper); border:1px solid rgba(240,237,230,.14); }
  @media (max-width:760px){ main{padding-top:22px}.hero,.block{padding:22px}.grid{grid-template-columns:1fr} nav{gap:12px;align-items:flex-start;flex-direction:column} }
</style></head><body><main><nav><a class="brand" href="/cn/">Hugo Mojo</a><a href="/cn/">返回测试</a></nav><section class="hero"><div class="eyebrow">Refund</div><h1>退款政策</h1><p>我们尽量把付费内容做得清楚。如果交付出现问题，会优先补发或协助解决。</p></section><section class="block"><h2>可退款情况</h2><p>重复付款、付款后未收到内容且 48 小时内无法补发、明显技术错误导致无法使用。</p><h2>不支持退款的情况</h2><p>已正常交付的数字内容，通常不支持无理由退款。因为内容一旦打开，就已经完成交付。</p><h2>申请方式</h2><p>请把付款截图、付款邮箱或订单号发到 hi@hugomojo.com，我们会人工处理。</p></section></main></body></html>
