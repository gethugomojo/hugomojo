<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hidden Talent Test - Hugo Mojo</title>
<meta name="description" content="Find your hidden talent in 3 minutes.">
<meta property="og:title" content="Hidden Talent Test - Hugo Mojo">
<meta property="og:description" content="That thing people tease you about? ">
<meta property="og:type" content="website">
<meta property="og:url" content="https://hugomojo.com/">
<meta property="og:image" content="https://hugomojo.com/og-hidden-talent-cn.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    margin: 0;
    overflow-x: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fafafa;
    color: #1a1a1a;
    -webkit-font-smoothing: antialiased;
  }
  .screen { position: relative; z-index: 1; display: none; min-height: 100vh; }
  .screen.active { display: block; }
  .primary-cta {
    background: #f97316;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 16px 32px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .primary-cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(249, 115, 22, 0.3);
  }
  .option {
    width: 100%;
    background: white;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    padding: 20px;
    text-align: left;
    font-size: 18px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .option:hover {
    border-color: #f97316;
    background: #fff7ed;
  }
  .option.selected {
    border-color: #f97316;
    background: #fff7ed;
  }
  .progress-bar {
    width: 100%;
    height: 6px;
    background: #e5e5e5;
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #f97316;
    transition: width 0.3s ease;
  }
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 16px;
    background: rgba(250,250,250,0.9);
    backdrop-filter: blur(8px);
    z-index: 10;
  }
  nav .nav-inner {
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo {
    font-weight: 700;
    font-size: 16px;
  }
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div class="logo"><img src="/logo.svg" alt="Hugo Mojo" class="h-6 w-auto"></div>
    <a href="https://www.hugomojo.com" class="text-sm text-gray-500">English</a>
  </div>
</nav>

<main class="pt-16">
  <section id="intro" class="screen active">
    <div class="max-w-lg mx-auto px-4 py-20 flex flex-col items-center text-center">
      <h1 class="text-5xl md:text-6xl font-bold leading-tight mb-6">
        三分钟<br>发现你的隐藏天赋<br>找到一个能用 AI 赚钱的副业方向
      </h1>
      <p class="text-2xl text-orange-500 font-semibold mb-8">
        
      </p>
      <p class="text-lg text-gray-500 mb-10">
      </p>
      <button class="primary-cta" onclick="startQuiz()">
        开始测试 →
      </button>
    </div>
  </section>

  <section id="quiz" class="screen">
    <div class="max-w-lg mx-auto px-4 py-10">
      <div class="progress-bar mb-8">
        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
      </div>
      <p id="qNumber" class="text-sm text-gray-400 mb-4">Question 1/13</p>
      <h1 id="questionText" class="text-3xl md:text-4xl font-bold leading-tight mb-10">
      </h1>
      <div id="optionsContainer" class="flex flex-col gap-4">
      </div>
      <div class="mt-8 flex justify-between">
        <button id="prevButton" class="text-gray-500 text-sm" onclick="prevQuestion()">Back</button>
        <button id="nextButton" class="primary-cta opacity-40" onclick="nextQuestion()" disabled>Next</button>
      </div>
    </div>
  </section>

  <section id="loading" class="screen">
    <div class="max-w-lg mx-auto px-4 py-20 flex flex-col items-center text-center">
      <h2 class="text-2xl font-bold mb-4">Calculating your result...</h2>
      <p class="text-gray-500">Just a second.</p>
    </div>
  </section>
</main>
<script>
const QUESTIONS = [
{"q":"群聊突然安静了，你最先注意到什么？","a":[["谁没回复了","radar"],["能让气氛轻松的话","sprite"],["接下来要做什么","bulldozer"],["哪条消息改变了气氛","fox"]]},
{"q":"新计划一开始就感觉有点不对，你通常会...","a":[["找可能出问题的地方","rabbit"],["看是不是有人在硬推","overloaded"],["想为什么感觉不对","fox"],["缩小成小测试","bulldozer"]]},
{"q":"朋友说“我没事”，但语气不对，你会...","a":[["想：不对，你肯定有事","radar"],["帮他们放下伪装","overloaded"],["问到底是什么事","fox"],["帮他们决定今晚做什么","bulldozer"]]},
{"q":"人们最需要你的时候，是他们需要...","a":[["一点动力","sprite"],["过滤风险的选择","rabbit"],["能看懂气氛的人","radar"],["能落地的版本","bulldozer"]]},
{"q":"人们最低估你的天赋是...","a":[["在麻烦出现前离开","rabbit"],["把无聊的事变得容易开始","sprite"],["捕捉别人语气的变化","radar"],["默默扛下很多","overloaded"]]},
{"q":"哪个夸奖最戳你？","a":[["你让人觉得安全","overloaded"],["你比别人先发现变化","radar"],["你真的把事做完了","bulldozer"],["你让大家都想加入","sprite"]]},
{"q":"什么最消耗你？","a":[["假的解释","fox"],["被困在不对的地方","rabbit"],["所有人同时需要你","overloaded"],["没有活力的房间","sprite"]]},
{"q":"你的大脑会兴奋，当...","a":[["要解开一个模式","fox"],["有更简单的退路","rabbit"],["有人需要软着陆","overloaded"],["想法需要更好的开场白","sprite"]]},
{"q":"当所有人都犹豫的时候，你通常会...","a":[["先做第一个可行的动作","bulldozer"],["注意谁快撑不住了","radar"],["说一句改变气氛的话","sprite"],["发现大家都在躲的决定","fox"]]},
{"q":"你的第一反应通常是...","a":[["扫一眼房间","radar"],["降低风险","rabbit"],["吸收压力","overloaded"],["把事做起来","bulldozer"]]},
{"q":"如果你做一个小付费产品，它会帮人...","a":[["不那么孤单","overloaded"],["避开坏选择","rabbit"],["搞懂到底发生了什么","fox"],["更有信心开始","sprite"]]},
{"q":"这个测试对你来说，什么最有用？","a":[["给我看隐藏的模式","fox"],["帮我避开错的方向","rabbit"],["给我明确的下一步","bulldozer"],["让我被准确地看见","radar"]]}
];
const TYPE_ORDER=['overloaded','rabbit','radar','sprite','bulldozer','fox'];
let current=0,answers={},scores=makeScores(),autoAdvanceTimer=null;
function makeScores(){const s={};TYPE_ORDER.forEach(k=>s[k]=0);return s;}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo({top:0,behavior:'smooth'});}
function startQuiz(){hmTrack('quiz_start');clearTimeout(autoAdvanceTimer);current=0;answers={};scores=makeScores();renderQuestion();showScreen('quiz');}
function renderQuestion(){const q=QUESTIONS[current],picked=answers[current];
  document.getElementById('qNumber').textContent = `Question ${current+1}/${QUESTIONS.length}`;
  document.getElementById('progressFill').style.width = ((current+1)/QUESTIONS.length*100)+'%';
  document.getElementById('questionText').textContent = q.q;
  const next=document.getElementById('nextButton');
  next.classList.toggle('opacity-40',!picked);
  next.disabled = !picked;
  let html='';
  q.a.forEach((item,i)=>{
    html+=`<button class="option ${picked===item[1]?'selected':''}" onclick="pickAnswer('${item[1]}')">${item[0]}</button>`;
  });
  document.getElementById('optionsContainer').innerHTML=html;
}
function pickAnswer(k){const q=current;clearTimeout(autoAdvanceTimer);answers[current]=k;renderQuestion();autoAdvanceTimer=setTimeout(()=>{if(current===q&&answers[q]===k)nextQuestion()},250);}
function prevQuestion(){clearTimeout(autoAdvanceTimer);if(current===0){showScreen('intro');return;}current--;renderQuestion();}
function nextQuestion(){clearTimeout(autoAdvanceTimer);if(!answers[current]){return;}if(current<QUESTIONS.length-1){current++;renderQuestion();return;}
  Object.values(answers).forEach(k=>scores[k]++);
  showScreen('loading');
  setTimeout(()=>{
    const result=rankTypes()[0]||TYPE_ORDER[0];
    hmTrack('quiz_complete',{talent:result});
    window.location.href = '/delivery/delivery_' + result + '_en.html';
  },900);
}
function rankTypes(){return Object.entries(scores).sort((a,b)=>(b[1]-a[1])||(TYPE_ORDER.indexOf(a[0])-TYPE_ORDER.indexOf(b[0]))).map(x=>x[0]);}
function hmTrack(){}
</script>
</body>
</html>
